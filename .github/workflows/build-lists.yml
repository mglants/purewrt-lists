name: build-lists

on:
  schedule:
    - cron: '17 4 * * *'   # daily, after upstream sources refresh
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: ['**.go', 'go.mod', 'examples/blocklist.yaml', '.github/workflows/build-lists.yml']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      - run: go test ./...
      - name: Compile bundle
        run: |
          go build -trimpath -ldflags='-s -w' -o nftset-builder .
          ./nftset-builder --config examples/blocklist.yaml --out dist --build-stamp "$(date -u +%s)"
          cat dist/manifest.json
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          files: |
            dist/manifest.json
            dist/catalog.json
            dist/*.native
            dist/zapret_candidates.json
            dist/blobs/*
