    - name: udp_games
      isp: common
      service: games
      protocols: [udp]
      udp_ports: "1024-65535"
      udp_pkt_out: 6
      udp_pkt_in: 2
      params: "--filter-udp=1024-65535 --payload=quic_initial --lua-desync=fake:blob=fake_default_quic:repeats=3:ip_autottl=-2,3-20:ip6_autottl=-2,3-20"
    # Game strategies mirror Zapret-Manager's Gv1-4: each combines the UDP fake
    # part (Gv) with the identical TCP multisplit-seqovl-582 part
    # (strategy_TCP_common) in one candidate, joined by --new — same as how
    # fix_GAME appends strategy_Gv + strategy_TCP_common. Translated to nfqws2
    # lua-desync. Wide port ranges, no L7 filter → matches any protocol on game
    # ports (Battlefield 6, Apex, Roblox, etc.). Gv1-4 differ only in the UDP
    # repeats/cutoff; the sweep-tester picks whichever passes a given ISP's DPI.
    # UDP fake blob is Zapret-Manager's quic_initial_dbankcloud_ru.bin, bundled
    # from blobs/ (see blobs/README.md); TCP seqovl pattern is the shipped stun.
    - name: games_g1
      isp: common
      service: games
      protocols: [tcp, udp]
      udp_ports: "88,1024-2407,2409-4499,4502-19293,19345-49999,50101-65535"
      tcp_ports: "2802,2302,2502,3724,6000-8000,8085,8090,8100,8903,8904,25565,27015-27030,27036-27037,50001,60442"
      udp_pkt_out: 2
      tcp_pkt_out: 5
      params: "--filter-udp=88,1024-2407,2409-4499,4502-19293,19345-49999,50101-65535 --payload=quic_initial --lua-desync=fake:blob=quic_dbankcloud:ip_autottl=-2,3-20:ip6_autottl=-2,3-20 --new --filter-tcp=2802,2302,2502,3724,6000-8000,8085,8090,8100,8903,8904,25565,27015-27030,27036-27037,50001,60442 --lua-desync=multisplit:pos=1:seqovl=582:seqovl_pattern=stun_fake"
      blobs:
        - {name: quic_dbankcloud, file: quic_initial_dbankcloud_ru.bin}
        - {name: stun_fake, file: stun.bin}
