      tcp_ports: "443"
      tcp_pkt_out: 2
      params: "--filter-tcp=443 --filter-l7=mtproto --payload=mtproto_initial --lua-desync=fake:blob=0x00000000:repeats=2:tcp_md5:ip_autottl=-2,3-20:ip6_autottl=-2,3-20 --lua-desync=multisplit:pos=16"
    - name: youtube_quic
