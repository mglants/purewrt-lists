# nftset-builder reference config.
# Produces one <category>.native list per category (nftset= directives +
# elements block) for purewrt native parsing. Each category takes any mix
# of inputs:
#   geosite: geosite.dat category names (resolved from geosite.url)
#   domains: domain-list sources → resolved by dnsmasq at query time
#   subnets: CIDR-list sources → static elements (each passes the ip_filter)
# Categories are declared in priority order: a domain equal-to/under an
# earlier category's domain is removed from later ones (so ai wins over
# media, and common excludes anything under ai/media).

table: inet blocklist
ipv6: true

# Shared geosite.dat for every category's geosite entries. Point url at any
# v2ray/Xray geosite.dat (MetaCubeX, Re-filter, Loyalsoldier...).
geosite:
  url: https://github.com/MetaCubeX/meta-rules-dat/releases/latest/download/geosite.dat

ip_filter:
  drop_host_routes: false     # drop /32 + /128 (pre-resolved single IPs)
  min_prefix_v4: 0           # 0 = keep any non-host prefix
  min_prefix_v6: 0
  cdn_exclude: []               # plain-CIDR sources carved out of the subnet sets
  #  - https://github.com/PentiumB/CDN-RuleSet/releases/latest/download/merged.sum

categories:
  ai:
    priority: 10
    geosite: [CATEGORY-AI-!CN, CATEGORY-AI-CN]
  media:
    priority: 20
    geosite: [youtube, netflix, spotify, disney, tiktok, twitch, hbo]
  common:
    priority: 100
    # NB: Re-filter publishes domains_all.lst as a release asset, but
    # community.lst only as a raw repo file (raw.githubusercontent.com).
    domains:
      - https://community.antifilter.download/list/domains.lst
      - https://github.com/1andrevich/Re-filter-lists/releases/latest/download/domains_all.lst
      - https://raw.githubusercontent.com/1andrevich/Re-filter-lists/main/community.lst
    # Fully-blocked networks — static elements.
    subnets:
      - https://antifilter.download/list/subnet.lst
      - https://github.com/1andrevich/Re-filter-lists/releases/latest/download/ipsum.lst
      - https://raw.githubusercontent.com/1andrevich/Re-filter-lists/main/community_ips.lst
      - https://raw.githubusercontent.com/1andrevich/Re-filter-lists/main/discord_ips.lst

# zapret2 strategy candidates published as zapret_candidates.json (the purewrt
# Zapret tester + preset dropdown fetch this). Blobs with a `url` (or resolved
# via blobs_base) are bundled under blobs/ + sha256'd; blobs without a source
# are resolved on the router from its zapret package.
strategies:
  # Custom nfqws2 decoy .bin files live in this repo under blobs/. The builder
  # copies any blob whose `file` is found there into dist/blobs/ + sha256's it,
  # so the router downloads + verifies it from the published release. A local
  # hit wins over blobs_base/url; blobs not found locally fall back to those,
  # and blobs with no source at all are resolved from the router's zapret pkg.
  blobs_dir: blobs
  # blobs_base: https://github.com/mglants/purewrt-lists/releases/latest/download/blobs/
  candidates:
    - name: default
      isp: common
      service: generic          # generic/untagged = wildcard, tried in every service-scoped sweep
      protocols: [tcp]
      tcp_ports: "80,443"
      params: "--filter-tcp=80 --filter-l7=http --payload=http_req --lua-desync=fake:blob=fake_default_http:tcp_md5 --lua-desync=multisplit:pos=method+2 --new --filter-tcp=443 --filter-l7=tls --payload=tls_client_hello --lua-desync=fake:blob=fake_default_tls:tcp_md5:tcp_seq=-10000 --lua-desync=multidisorder:pos=1,midsld"
    - name: multisplit
      isp: common
      protocols: [tcp]
      tcp_ports: "80,443"
      params: "--filter-tcp=80 --filter-l7=http --payload=http_req --lua-desync=fake:blob=fake_default_http:tcp_md5 --lua-desync=multisplit:pos=method+2 --new --filter-tcp=443 --filter-l7=tls --payload=tls_client_hello --lua-desync=fake:blob=fake_default_tls:tcp_md5:tcp_seq=-10000 --lua-desync=multisplit:pos=1,midsld"
    - name: fake_repeats6
      isp: common
      protocols: [tcp]
      tcp_ports: "80,443"
      params: "--filter-tcp=80 --filter-l7=http --payload=http_req --lua-desync=fake:blob=fake_default_http:tcp_md5 --lua-desync=multisplit:pos=method+2 --new --filter-tcp=443 --filter-l7=tls --payload=tls_client_hello --lua-desync=fake:blob=fake_default_tls:tcp_md5:repeats=6 --lua-desync=multidisorder:pos=1,midsld"
    - name: fake_only
      isp: common
      protocols: [tcp]
      tcp_ports: "80,443"
      params: "--filter-tcp=80 --filter-l7=http --payload=http_req --lua-desync=fake:blob=fake_default_http:tcp_md5 --lua-desync=multisplit:pos=method+2 --new --filter-tcp=443 --filter-l7=tls --payload=tls_client_hello --lua-desync=fake:blob=fake_default_tls:tcp_md5"
    - name: youtube
      isp: common
      service: youtube
      protocols: [tcp, udp]
      tcp_ports: "80,443"
      udp_ports: "443"
      params: "--filter-tcp=80 --filter-l7=http --payload=http_req --lua-desync=fake:blob=fake_default_http:tcp_md5 --lua-desync=multisplit:pos=method+2 --new --filter-tcp=443 --filter-l7=tls --payload=tls_client_hello --lua-desync=multisplit:pos=2,sniext+1:seqovl=679:seqovl_pattern=tls_google --new --filter-udp=443 --filter-l7=quic --payload=quic_initial --lua-desync=fake:blob=quic_google:repeats=6"
      blobs:
        - {name: tls_google, file: tls_clienthello_www_google_com.bin}
        - {name: quic_google, file: quic_initial_www_google_com.bin}
    - name: discord
      isp: common
      service: discord
      protocols: [tcp, udp]
      tcp_ports: "80,443"
      udp_ports: "443"
      params: "--filter-tcp=80 --filter-l7=http --payload=http_req --lua-desync=fake:blob=fake_default_http:tcp_md5 --lua-desync=multisplit:pos=method+2 --new --filter-tcp=443 --filter-l7=tls --payload=tls_client_hello --lua-desync=multidisorder:pos=1,sniext+1:seqovl=336:seqovl_pattern=tls_google --new --filter-udp=443 --filter-l7=stun,discord --lua-desync=fake:blob=stun_fake:repeats=6"
